<div class="ui-input-group">
  <label *ngIf="label()" class="ui-input-label">{{ label() }}</label>
  <input
    [type]="type()"
    [placeholder]="placeholder()"
    [value]="value()"
    [disabled]="disabled()"
    [class.ui-input-error]="error()"
    class="ui-form-input"
    (input)="onValueChange($event)"
  />
  <span *ngIf="error()" class="ui-input-error-msg">{{ error() }}</span>
</div>
